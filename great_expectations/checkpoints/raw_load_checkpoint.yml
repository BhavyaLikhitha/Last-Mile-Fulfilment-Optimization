name: raw_load_checkpoint
config_version: 1.0
class_name: Checkpoint
run_name_template: "raw_load_%Y%m%d_%H%M%S"
validations:
  - batch_request:
      datasource_name: snowflake_raw
      data_asset_name: fact_orders
    expectation_suite_name: raw_orders_suite
  - batch_request:
      datasource_name: snowflake_raw
      data_asset_name: fact_deliveries
    expectation_suite_name: raw_deliveries_suite
  - batch_request:
      datasource_name: snowflake_raw
      data_asset_name: fact_inventory_snapshot
    expectation_suite_name: raw_inventory_suite
action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
