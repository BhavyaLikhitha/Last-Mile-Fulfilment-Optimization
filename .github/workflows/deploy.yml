name: Deploy

on:
  push:
    branches: [main]

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -var-file=environments/dev.tfvars -auto-approve
        continue-on-error: true

  deploy-lambda:
    needs: terraform-apply
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lambda dependencies
        run: |
          pip install numpy pandas python-dateutil pytz \
            --target ./lambda_package \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all:

      - name: Package Lambda
        run: |
          cp data_simulation/lambda_handler.py lambda_package/
          cp -r config/ lambda_package/config/
          cp -r data_simulation/ lambda_package/data_simulation/
          cd lambda_package && zip -r ../lambda_deploy.zip .

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name fulfillment-data-generator \
            --zip-file fileb://lambda_deploy.zip \
            --region us-east-2
